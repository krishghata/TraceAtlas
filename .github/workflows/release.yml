name: Release

# ── Triggers ──────────────────────────────────────────────────────────────────
# 1. Push a version tag:  git tag v1.2.0 && git push origin v1.2.0
# 2. Manual run from GitHub Actions tab (choose branch + optional tag override)
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v1.2.0) — used for the release name'
        required: false
        default: 'v1.0.0'

jobs:
  release:
    strategy:
      fail-fast: false   # let other platforms finish even if one fails
      matrix:
        include:
          # ── Windows ──────────────────────────────────────────────────────
          - platform: windows-latest
            args: ''
          # ── macOS (Apple Silicon + Intel via universal binary) ────────────
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          # ── Linux ─────────────────────────────────────────────────────────
          - platform: ubuntu-22.04
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      # ── Source ─────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node.js ────────────────────────────────────────────────────────────
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # ── Rust ───────────────────────────────────────────────────────────────
      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS universal binary needs both targets
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # ── Linux system deps ──────────────────────────────────────────────────
      # Tauri v2 needs WebKitGTK 4.1 on Ubuntu 22.04.
      # libsqlite3-dev is required by tauri-plugin-sql.
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libssl-dev \
            libsqlite3-dev \
            patchelf

      # ── Frontend ───────────────────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm install

      # ── Build & publish release ────────────────────────────────────────────
      # tauri-action builds the app and uploads all platform artifacts to a
      # single GitHub Release (draft by default — review before publishing).
      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ── Optional: macOS code signing ─────────────────────────────────
          # Uncomment and add these secrets in Settings → Secrets to sign.
          # APPLE_CERTIFICATE:          ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY:     ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID:                   ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD:             ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID:              ${{ secrets.APPLE_TEAM_ID }}
          # ── Optional: Windows code signing ────────────────────────────────
          # TAURI_SIGNING_PRIVATE_KEY:          ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'TraceAtlas ${{ github.ref_name }}'
          releaseBody: |
            ## TraceAtlas ${{ github.ref_name }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows  | `.msi` (recommended) or `.exe` (NSIS) |
            | macOS    | `.dmg` (universal — runs on both Intel and Apple Silicon) |
            | Linux    | `.AppImage` (portable) or `.deb` (Debian/Ubuntu) |

            ### What's new
            _See commits since last release._
          releaseDraft: true      # → creates a draft; you publish it manually
          prerelease: false
          tauriScript: npm run tauri
          args: ${{ matrix.args }}
