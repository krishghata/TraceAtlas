<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Light background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </radialGradient>

    <!-- Globe surface gradient -->
    <radialGradient id="globeGrad" cx="42%" cy="38%" r="58%">
      <stop offset="0%" stop-color="#f0f9ff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </radialGradient>

    <!-- Arc glow filter -->
    <filter id="arcGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Dot glow filter -->
    <filter id="dotGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Clip globe content to circle -->
    <clipPath id="globeClip">
      <circle cx="512" cy="512" r="375"/>
    </clipPath>
  </defs>

  <!-- Outer background circle -->
  <circle cx="512" cy="512" r="490" fill="url(#bgGrad)"/>

  <!-- Globe body -->
  <circle cx="512" cy="512" r="375" fill="url(#globeGrad)"/>

  <!-- Globe wireframe -->
  <g clip-path="url(#globeClip)" stroke="#7dd3fc" stroke-width="5" fill="none" opacity="0.9">
    <circle cx="512" cy="512" r="375"/>
    <ellipse cx="512" cy="512" rx="375" ry="90"/>
    <ellipse cx="512" cy="390" rx="345" ry="68"/>
    <ellipse cx="512" cy="634" rx="345" ry="68"/>
    <ellipse cx="512" cy="278" rx="255" ry="46"/>
    <ellipse cx="512" cy="746" rx="255" ry="46"/>
    <ellipse cx="512" cy="512" rx="90" ry="375"/>
    <ellipse cx="512" cy="512" rx="200" ry="375"/>
    <ellipse cx="512" cy="512" rx="330" ry="375"/>
  </g>

  <!-- Globe outer ring -->
  <circle cx="512" cy="512" r="375" fill="none" stroke="#38bdf8" stroke-width="3"/>

  <!-- ── Route Arc (glow layers) ────────────────────────────── -->
  <path d="M 218 680 C 268 370, 720 320, 806 412"
    fill="none" stroke="#0284c7" stroke-width="28" stroke-linecap="round" opacity="0.08"
    filter="url(#arcGlow)"/>
  <path d="M 218 680 C 268 370, 720 320, 806 412"
    fill="none" stroke="#0284c7" stroke-width="18" stroke-linecap="round" opacity="0.18"/>
  <path d="M 218 680 C 268 370, 720 320, 806 412"
    fill="none" stroke="#0369a1" stroke-width="11" stroke-linecap="round" opacity="0.55"/>
  <path d="M 218 680 C 268 370, 720 320, 806 412"
    fill="none" stroke="#0369a1" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
  <path d="M 218 680 C 268 370, 720 320, 806 412"
    fill="none" stroke="#0c4a6e" stroke-width="3" stroke-linecap="round" opacity="1"/>

  <!-- ── Hop dots ────────────────────────────────────────────── -->

  <!-- Source dot -->
  <g filter="url(#dotGlow)">
    <circle cx="218" cy="680" r="30" fill="#0284c7" opacity="0.15"/>
    <circle cx="218" cy="680" r="20" fill="#0284c7" opacity="0.30"/>
    <circle cx="218" cy="680" r="12" fill="#0369a1" opacity="0.80"/>
    <circle cx="218" cy="680" r="7"  fill="#0c4a6e" opacity="1"/>
  </g>

  <!-- Mid hop dot -->
  <g filter="url(#dotGlow)">
    <circle cx="510" cy="328" r="26" fill="#0284c7" opacity="0.15"/>
    <circle cx="510" cy="328" r="17" fill="#0284c7" opacity="0.30"/>
    <circle cx="510" cy="328" r="10" fill="#0369a1" opacity="0.80"/>
    <circle cx="510" cy="328" r="6"  fill="#0c4a6e" opacity="1"/>
  </g>

  <!-- Destination dot -->
  <g filter="url(#dotGlow)">
    <circle cx="806" cy="412" r="30" fill="#0284c7" opacity="0.15"/>
    <circle cx="806" cy="412" r="20" fill="#0284c7" opacity="0.30"/>
    <circle cx="806" cy="412" r="12" fill="#0369a1" opacity="0.80"/>
    <circle cx="806" cy="412" r="7"  fill="#0c4a6e" opacity="1"/>
  </g>

  <!-- Outer ring -->
  <circle cx="512" cy="512" r="490" fill="none" stroke="#7dd3fc" stroke-width="4" opacity="0.7"/>
</svg>
